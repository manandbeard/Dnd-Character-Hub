openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: D&D Character Builder API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: users
    description: User profile operations
  - name: characters
    description: Character CRUD and sheet operations
  - name: races
    description: SRD race reference data
  - name: classes
    description: SRD class reference data
  - name: backgrounds
    description: SRD background reference data
  - name: spells
    description: SRD spell reference data
  - name: items
    description: SRD item reference data
  - name: inventory
    description: Character inventory operations
  - name: campaigns
    description: Campaign management and membership
  - name: party-inventory
    description: Party shared item stash and currency pool
  - name: party-ledger
    description: Campaign transaction history

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ── Users ──────────────────────────────────────────────────────────────────
  /users/me:
    get:
      operationId: getMe
      tags: [users]
      summary: Get current user profile
      security:
        - clerkAuth: []
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    patch:
      operationId: updateMe
      tags: [users]
      summary: Update current user profile
      security:
        - clerkAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserBody"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  # ── Characters ──────────────────────────────────────────────────────────────
  /characters:
    get:
      operationId: listCharacters
      tags: [characters]
      summary: List characters for current user
      security:
        - clerkAuth: []
      responses:
        "200":
          description: List of characters
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Character"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    post:
      operationId: createCharacter
      tags: [characters]
      summary: Create a new character
      security:
        - clerkAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCharacterBody"
      responses:
        "201":
          description: Created character
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Character"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /characters/{id}:
    get:
      operationId: getCharacter
      tags: [characters]
      summary: Get character by ID
      security:
        - clerkAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Character
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CharacterWithDerived"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    patch:
      operationId: updateCharacter
      tags: [characters]
      summary: Update character fields
      security:
        - clerkAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCharacterBody"
      responses:
        "200":
          description: Updated character
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CharacterWithDerived"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    delete:
      operationId: deleteCharacter
      tags: [characters]
      summary: Delete a character
      security:
        - clerkAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /characters/{id}/derived-stats:
    get:
      operationId: getCharacterDerivedStats
      tags: [characters]
      summary: Get computed derived stats for a character
      security:
        - clerkAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Derived stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DerivedStats"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /characters/{id}/level-up:
    post:
      operationId: levelUpCharacter
      tags: [characters]
      summary: Level up a character
      security:
        - clerkAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LevelUpBody"
      responses:
        "200":
          description: Updated character after level-up
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CharacterWithDerived"
        "400":
          description: Invalid level-up data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  # ── Character Inventory ─────────────────────────────────────────────────────
  /characters/{id}/inventory:
    get:
      operationId: listCharacterInventory
      tags: [inventory]
      summary: List character inventory
      security:
        - clerkAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Inventory items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/InventoryItem"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    post:
      operationId: addInventoryItem
      tags: [inventory]
      summary: Add item to character inventory
      security:
        - clerkAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddInventoryItemBody"
      responses:
        "201":
          description: Added item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InventoryItem"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /characters/{id}/inventory/{itemId}:
    patch:
      operationId: updateInventoryItem
      tags: [inventory]
      summary: Update inventory item (quantity, equipped, attuned, notes)
      security:
        - clerkAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: itemId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateInventoryItemBody"
      responses:
        "200":
          description: Updated item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InventoryItem"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    delete:
      operationId: removeInventoryItem
      tags: [inventory]
      summary: Remove item from inventory
      security:
        - clerkAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: itemId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Removed
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  # ── Races ───────────────────────────────────────────────────────────────────
  /races:
    get:
      operationId: listRaces
      tags: [races]
      summary: List all races
      responses:
        "200":
          description: List of races
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RaceRef"

  /races/{slug}:
    get:
      operationId: getRace
      tags: [races]
      summary: Get race by slug
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Race
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RaceRef"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  # ── Classes ─────────────────────────────────────────────────────────────────
  /classes:
    get:
      operationId: listClasses
      tags: [classes]
      summary: List all classes
      responses:
        "200":
          description: List of classes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ClassRef"

  /classes/{slug}:
    get:
      operationId: getClass
      tags: [classes]
      summary: Get class by slug
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Class
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClassRef"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  # ── Backgrounds ─────────────────────────────────────────────────────────────
  /backgrounds:
    get:
      operationId: listBackgrounds
      tags: [backgrounds]
      summary: List all backgrounds
      responses:
        "200":
          description: List of backgrounds
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BackgroundRef"

  /backgrounds/{slug}:
    get:
      operationId: getBackground
      tags: [backgrounds]
      summary: Get background by slug
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Background
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BackgroundRef"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  # ── Spells ──────────────────────────────────────────────────────────────────
  /spells:
    get:
      operationId: listSpells
      tags: [spells]
      summary: List all spells (with optional filters)
      parameters:
        - name: class
          in: query
          required: false
          schema:
            type: string
        - name: level
          in: query
          required: false
          schema:
            type: integer
        - name: school
          in: query
          required: false
          schema:
            type: string
        - name: search
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: List of spells
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SpellRef"

  /spells/{slug}:
    get:
      operationId: getSpell
      tags: [spells]
      summary: Get spell by slug
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Spell
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SpellRef"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  # ── Items ───────────────────────────────────────────────────────────────────
  /items:
    get:
      operationId: listItems
      tags: [items]
      summary: List all items (with optional filters)
      parameters:
        - name: type
          in: query
          required: false
          schema:
            type: string
        - name: rarity
          in: query
          required: false
          schema:
            type: string
        - name: search
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: List of items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ItemRef"

  /items/{slug}:
    get:
      operationId: getItem
      tags: [items]
      summary: Get item by slug
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ItemRef"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  # ── Campaigns ────────────────────────────────────────────────────────────────
  /campaigns:
    get:
      operationId: listCampaigns
      tags: [campaigns]
      summary: List campaigns the user belongs to
      security:
        - clerkAuth: []
      responses:
        "200":
          description: List of campaigns
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Campaign"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    post:
      operationId: createCampaign
      tags: [campaigns]
      summary: Create a new campaign (caller becomes DM)
      security:
        - clerkAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCampaignBody"
      responses:
        "201":
          description: Created campaign
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Campaign"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /campaigns/join:
    post:
      operationId: joinCampaign
      tags: [campaigns]
      summary: Join a campaign via invite code
      security:
        - clerkAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/JoinCampaignBody"
      responses:
        "200":
          description: Joined campaign
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Campaign"
        "400":
          description: Invalid invite code
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /campaigns/{id}:
    get:
      operationId: getCampaign
      tags: [campaigns]
      summary: Get campaign details
      security:
        - clerkAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Campaign details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CampaignDetail"
        "403":
          description: Not a member
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    patch:
      operationId: updateCampaign
      tags: [campaigns]
      summary: Update campaign name/description (DM only)
      security:
        - clerkAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCampaignBody"
      responses:
        "200":
          description: Updated campaign
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Campaign"
        "403":
          description: Not DM
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    delete:
      operationId: deleteCampaign
      tags: [campaigns]
      summary: Delete campaign (DM only)
      security:
        - clerkAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "403":
          description: Not DM
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /campaigns/{id}/invite/refresh:
    post:
      operationId: refreshInviteCode
      tags: [campaigns]
      summary: Generate a new invite code (DM only)
      security:
        - clerkAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Updated invite code
          content:
            application/json:
              schema:
                type: object
                properties:
                  inviteCode:
                    type: string
                required:
                  - inviteCode
        "403":
          description: Not DM
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /campaigns/{id}/members/{userId}:
    delete:
      operationId: removeCampaignMember
      tags: [campaigns]
      summary: Remove a member from the campaign (DM only)
      security:
        - clerkAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: userId
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Removed
        "403":
          description: Not DM
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Member not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /campaigns/{id}/characters:
    get:
      operationId: listCampaignCharacters
      tags: [campaigns]
      summary: List characters attached to the campaign
      security:
        - clerkAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of characters with derived stats
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CharacterWithDerived"
        "403":
          description: Not a member
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    post:
      operationId: attachCharacterToCampaign
      tags: [campaigns]
      summary: Attach one of your characters to the campaign
      security:
        - clerkAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                characterId:
                  type: integer
              required:
                - characterId
      responses:
        "201":
          description: Character attached
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CharacterWithDerived"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Not a member
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /campaigns/{id}/characters/{characterId}:
    delete:
      operationId: detachCharacterFromCampaign
      tags: [campaigns]
      summary: Detach a character from the campaign
      security:
        - clerkAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: characterId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Detached
        "403":
          description: Not owner or DM
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  # ── Party Inventory ────────────────────────────────────────────────────────
  /campaigns/{id}/party-items:
    get:
      operationId: listPartyItems
      tags: [party-inventory]
      summary: List all items in the party stash
      security:
        - clerkAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: search
          in: query
          schema:
            type: string
        - name: claimedByCharacterId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Party stash items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PartyItem"
        "403":
          description: Not a member
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    post:
      operationId: addPartyItem
      tags: [party-inventory]
      summary: Add an item to the party stash
      security:
        - clerkAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddPartyItemBody"
      responses:
        "201":
          description: Item added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PartyItem"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Not a member
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /campaigns/{id}/party-items/{itemId}:
    patch:
      operationId: updatePartyItem
      tags: [party-inventory]
      summary: Update a party stash item (quantity, notes)
      security:
        - clerkAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: itemId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePartyItemBody"
      responses:
        "200":
          description: Updated item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PartyItem"
        "403":
          description: Not DM or item claimer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    delete:
      operationId: removePartyItem
      tags: [party-inventory]
      summary: Remove an item from the party stash
      security:
        - clerkAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: itemId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Removed
        "403":
          description: Not DM or item claimer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /campaigns/{id}/party-items/{itemId}/transfer:
    post:
      operationId: transferPartyItem
      tags: [party-inventory]
      summary: Transfer an item between party stash and a character inventory
      security:
        - clerkAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: itemId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TransferPartyItemBody"
      responses:
        "200":
          description: Transfer recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LedgerEntry"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Not DM or item claimer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  # ── Party Currency ─────────────────────────────────────────────────────────
  /campaigns/{id}/currency/deposit:
    post:
      operationId: depositCurrency
      tags: [party-inventory]
      summary: Deposit coins into the party pool
      security:
        - clerkAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CurrencyDeltaBody"
      responses:
        "200":
          description: Updated party currency pool
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PartyCurrency"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Not a member
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /campaigns/{id}/currency/withdraw:
    post:
      operationId: withdrawCurrency
      tags: [party-inventory]
      summary: Withdraw coins from the party pool
      security:
        - clerkAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CurrencyDeltaBody"
      responses:
        "200":
          description: Updated party currency pool
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PartyCurrency"
        "400":
          description: Insufficient funds or validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Not a member
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /campaigns/{id}/currency/split:
    post:
      operationId: splitCurrency
      tags: [party-inventory]
      summary: Split party pool evenly among all active party members
      security:
        - clerkAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                notes:
                  type: string
              required: []
      responses:
        "200":
          description: Coin split result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CoinSplitResult"
        "400":
          description: No members or empty pool
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Not DM
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  # ── Party Ledger ───────────────────────────────────────────────────────────
  /campaigns/{id}/ledger:
    get:
      operationId: listLedgerEntries
      tags: [party-ledger]
      summary: Get the transaction history for a campaign
      security:
        - clerkAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: type
          in: query
          schema:
            type: string
        - name: characterId
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: Ledger entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LedgerEntry"
        "403":
          description: Not a member
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

